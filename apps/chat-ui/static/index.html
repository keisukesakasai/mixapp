<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Investor Agent やりとり</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4f;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --user-bg: #1f6feb;
      --agent-bg: #238636;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    header h1 { margin: 0; font-size: 1.25rem; font-weight: 600; }
    header p { margin: 0.25rem 0 0; font-size: 0.875rem; color: var(--text-muted); }
    .header-right { display: flex; align-items: center; gap: 0.5rem; }
    #refresh {
      padding: 0.4rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--input-bg);
      color: var(--text);
      cursor: pointer;
      font-size: 0.875rem;
    }
    #refresh:hover { background: var(--border); }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .msg {
      max-width: 85%;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--user-bg);
      color: #fff;
    }
    .msg.agent {
      align-self: flex-start;
      background: var(--surface);
      border: 1px solid var(--border);
    }
    .msg .meta { font-size: 0.7rem; opacity: 0.8; margin-top: 0.5rem; }
    .empty { color: var(--text-muted); text-align: center; padding: 2rem; }
    .error { color: #f85149; font-size: 0.875rem; padding: 1rem 1.5rem; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Investor Agent やりとり</h1>
      <p>Load generator や API 経由でスタックされた質問・回答を表示します（参照のみ）</p>
    </div>
    <div class="header-right">
      <span id="status" style="font-size:0.8rem;color:var(--text-muted)"></span>
      <button type="button" id="refresh">更新</button>
    </div>
  </header>
  <div id="messages"></div>
  <script>
    const messagesEl = document.getElementById('messages');
    const refreshBtn = document.getElementById('refresh');
    const statusEl = document.getElementById('status');

    function escapeHtml(s) {
      if (s == null) return '';
      const el = document.createElement('div');
      el.textContent = String(s);
      return el.innerHTML;
    }

    function renderMessage(role, content, model, timestamp) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      const label = role === 'user' ? '質問' : 'Investor Agent';
      let meta = '';
      if (model) meta += escapeHtml(model);
      if (timestamp) meta += (meta ? ' · ' : '') + new Date(timestamp * 1000).toLocaleString('ja-JP');
      div.innerHTML = '<strong>' + escapeHtml(label) + '</strong><br>' + escapeHtml(content) +
        (meta ? '<div class="meta">' + meta + '</div>' : '');
      return div;
    }

    async function load() {
      statusEl.textContent = '取得中...';
      refreshBtn.disabled = true;
      try {
        const r = await fetch('/api/messages');
        const data = await r.json().catch(() => ({}));
        messagesEl.innerHTML = '';
        if (data.error) {
          messagesEl.innerHTML = '<div class="error">' + escapeHtml(data.error) + '</div>';
        } else if (!data.messages || data.messages.length === 0) {
          messagesEl.innerHTML = '<div class="empty">まだやりとりはありません。Load generator が動くか、Investor Agent に POST /ask するとここに積まれます。</div>';
        } else {
          data.messages.forEach(function (m) {
            messagesEl.appendChild(renderMessage('user', m.question, null, m.timestamp));
            messagesEl.appendChild(renderMessage('agent', m.answer, m.model, m.timestamp));
          });
        }
        statusEl.textContent = '最終更新: ' + new Date().toLocaleTimeString('ja-JP');
      } catch (err) {
        messagesEl.innerHTML = '<div class="error">通信エラー: ' + escapeHtml(err.message) + '</div>';
        statusEl.textContent = '';
      } finally {
        refreshBtn.disabled = false;
      }
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    refreshBtn.addEventListener('click', load);
    load();
    setInterval(load, 10000);
  </script>
</body>
</html>
