# Investor Agent・Load generator イメージをビルドして GHCR にプッシュ
name: Build and push images

on:
  push:
    branches: [main]
    paths:
      - 'apps/investor-agent/**'
      - 'apps/load-generator/**'
      - 'apps/chat-ui/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push investor-agent
        uses: docker/build-push-action@v6
        with:
          context: apps/investor-agent
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/mixapp-investor-agent:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/mixapp-investor-agent:${{ github.sha }}

      - name: Build and push load-generator
        uses: docker/build-push-action@v6
        with:
          context: apps/load-generator
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/mixapp-load-generator:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/mixapp-load-generator:${{ github.sha }}

      - name: Build and push chat-ui
        uses: docker/build-push-action@v6
        with:
          context: apps/chat-ui
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/mixapp-chat-ui:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/mixapp-chat-ui:${{ github.sha }}
