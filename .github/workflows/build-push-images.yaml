# 全 Agent のイメージをビルドして GHCR にプッシュ（Git push → ビルド → デプロイ用）
# 新規 Agent 追加時は matrix.app に名前を追加すること（.cursor/rules/deployment.mdc 参照）
name: Build and push images

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        app: [investor-agent, load-generator, chat-ui]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: apps/${{ matrix.app }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/mixapp-${{ matrix.app }}:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/mixapp-${{ matrix.app }}:${{ github.sha }}
