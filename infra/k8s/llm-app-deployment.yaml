apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-app
  namespace: mixapp
  labels:
    app: llm-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-app
  template:
    metadata:
      labels:
        app: llm-app
    spec:
      containers:
        - name: llm-app
          image: ghcr.io/keisukesakasai/mixapp-llm-app:latest
          ports:
            - containerPort: 8000
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-app-openai
                  key: openai-api-key
            - name: MODEL
              value: "gpt-4o-mini"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: llm-app
  namespace: mixapp
  labels:
    app: llm-app
spec:
  selector:
    app: llm-app
  ports:
    - port: 8000
      targetPort: 8000
      name: http
