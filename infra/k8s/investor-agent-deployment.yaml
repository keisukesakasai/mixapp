apiVersion: apps/v1
kind: Deployment
metadata:
  name: investor-agent
  namespace: mixapp
  labels:
    app: investor-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: investor-agent
  template:
    metadata:
      labels:
        app: investor-agent
    spec:
      containers:
        - name: investor-agent
          # GHCR のパッケージ名が mixapp-llm-app のためこのイメージを参照（中身は Investor Agent）
          image: ghcr.io/keisukesakasai/mixapp-llm-app:latest
          ports:
            - containerPort: 8000
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: investor-agent-openai
                  key: openai-api-key
            - name: MODEL
              value: "gpt-4o-mini"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: investor-agent
  namespace: mixapp
  labels:
    app: investor-agent
spec:
  selector:
    app: investor-agent
  ports:
    - port: 8000
      targetPort: 8000
      name: http
