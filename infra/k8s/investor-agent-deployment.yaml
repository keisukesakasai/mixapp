apiVersion: apps/v1
kind: Deployment
metadata:
  name: investor-agent
  namespace: mixapp
  labels:
    app: investor-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: investor-agent
  template:
    metadata:
      labels:
        app: investor-agent
    spec:
      containers:
        - name: investor-agent
          image: ghcr.io/keisukesakasai/mixapp-investor-agent:latest
          ports:
            - containerPort: 8000
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: investor-agent-openai
                  key: openai-api-key
            - name: MODEL
              value: "gpt-4o-mini"
            - name: REDIS_URL
              value: "redis://redis:6379/0"
            # Datadog APM: 同一ノードの Agent にトレースを送る
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            # Datadog LLM Observability 有効化
            - name: DD_LLMOBS_ENABLED
              value: "1"
            - name: DD_SERVICE
              value: "investor-agent"
            - name: DD_ENV
              value: "staging"
            # 観測時は datadog-secret を作成すること。未作成の場合は optional のため Pod は起動するが LLM Obs は無効。
            - name: DD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: datadog-secret
                  key: api-key
                  optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: investor-agent
  namespace: mixapp
  labels:
    app: investor-agent
spec:
  selector:
    app: investor-agent
  ports:
    - port: 8000
      targetPort: 8000
      name: http
