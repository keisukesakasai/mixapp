apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-generator
  namespace: mixapp
  labels:
    app: load-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: load-generator
  template:
    metadata:
      labels:
        app: load-generator
    spec:
      containers:
        - name: load-generator
          image: ghcr.io/keisukesakasai/mixapp-load-generator:latest
          env:
            - name: LLM_APP_URL
              value: "http://investor-agent:8000"
            # 質問送信間隔（秒）
            - name: INTERVAL_SEC
              value: "2"
